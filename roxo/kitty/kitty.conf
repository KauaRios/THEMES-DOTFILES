# ── Font ─────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# ── Cursor ───────────────────────────────────────────────
cursor                     #cba6f7
cursor_text_color          #11111b
cursor_shape               block
cursor_blink_interval      0.4

# ── Window ───────────────────────────────────────────────
window_padding_width       14
window_border_width        1px
active_border_color        #cba6f7
inactive_border_color      #313244
background_opacity         0.85
background                 #1e1e2e
foreground                 #cdd6f4

# ── Cores Principais (Catppuccin Mocha) ───────────────────
selection_background    #313244
selection_foreground    #cba6f7

url_color               #f5e0dc
url_style               curly

# Black
color0 #45475a
color8 #585b70

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2 #a6e3a1
color10 #a6e3a1

# Yellow
color3 #f9e2af
color11 #f9e2af

# Blue
color4 #89b4fa
color12 #89b4fa

# Magenta (Purple)
color5 #cba6f7
color13 #cba6f7

# Cyan
color6 #94e2d5
color14 #94e2d5

# White
color7 #bac2de
color15 #a6adc8

# Tab bar
active_tab_background   #cba6f7
active_tab_foreground   #11111b
inactive_tab_background #181825
inactive_tab_foreground #cba6f7
tab_bar_background      #11111b
