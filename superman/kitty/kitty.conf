# ══════════════════════════════════════════════
# KITTY — SUPERMAN THEME
# bg:       #080d14  (deep wallpaper navy)
# red:      #ec644c  (cape red-orange)
# blue:     #1a6186  (suit blue)
# sky:      #3fb0d8  (bright sky blue)
# ══════════════════════════════════════════════

# ── Font ─────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# ── Cursor ───────────────────────────────────────────
cursor                     #3fb0d8
cursor_text_color          #080d14
cursor_shape               block
cursor_blink_interval      0.5

# ── Window ───────────────────────────────────────────
window_padding_width       14
window_border_width        1px
active_border_color        #1a6186
inactive_border_color      #0d1622
background_opacity         0.92
background                 #080d14
foreground                 #c8d8e8

# ── Selection ────────────────────────────────────────
selection_background    #1a3a55
selection_foreground    #e8f0f8

# ── URLs ─────────────────────────────────────────────
url_color               #3fb0d8
url_style               curly

# ── Colors ───────────────────────────────────────────
# Black
color0  #0d141f
color8  #1e3048

# Red — Cape (Superman red-orange)
color1  #831818
color9  #ec644c

# Green — Steel / Kryptonian glow
color2  #1a6050
color10 #2db890

# Yellow — Sun energy
color3  #8b6020
color11 #f0b050

# Blue — Suit (Superman blue)
color4  #1a4a6a
color12 #3fb0d8

# Magenta — Kryptonite purple tones
color5  #3a2060
color13 #7850c8

# Cyan — Sky/atmosphere
color6  #155872
color14 #5dd0f0

# White — Light
color7  #8fa3bc
color15 #e8f0f8

# ── Tab Bar ──────────────────────────────────────────
active_tab_background    #0d141f
active_tab_foreground    #3fb0d8
inactive_tab_background  #080d14
inactive_tab_foreground  #2a4060
tab_bar_background       #050a10
