# ── Premium Dark Blue - Kitty Config ──
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        11.0

# ── Cursor ───────────────────────────────────────────────
cursor                     #00D4FF
cursor_text_color          #0A0F14
cursor_shape               block
cursor_blink_interval      0.4

# ── Window ───────────────────────────────────────────────
window_padding_width       14
window_border_width        1px
active_border_color       #00D4FF
inactive_border_color     #162332
background_opacity        0.92
background                #0A0F14
foreground                #E0F7FF

# ── Selection ─────────────────────────────────────────────
selection_background    #162332
selection_foreground   #E0F7FF

# ── URL ─────────────────────────────────────────────────
url_color               #5EEAD4
url_style               curly

# ── Black (Deep Navy) ────────────────────────────────────
color0  #0A0F14
color8  #162332

# ── Red ──────────────────────────────────────────────────
color1  #1E3A5F
color9  #0891B2

# ── Green ────────────────────────────────────────────────
color2  #164E63
color10 #00D4FF

# ── Yellow ───────────────────────────────────────────────
color3  #155E75
color11 #5EEAD4

# ── Blue (Primary - Sapphire) ────────────────────────────
color4  #0E4B5A
color12 #00D4FF

# ── Magenta ──────────────────────────────────────────────
color5  #173B53
color13 #0891B2

# ── Cyan (Accent) ────────────────────────────────────────
color6  #164E63
color14 #5EEAD4

# ── White ───────────────────────────────────────────────
color7  #E0F7FF
color15 #FFFFFF

# ── Tab bar ──────────────────────────────────────────────
